server.port=8200

spring.datasource.url=jdbc:mysql://localhost:3306/Pidev4eme?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.application.name=back-service

eureka.client.service-url.defaultZone=http://localhost:8150/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Monitoring endpoints
management.endpoints.web.exposure.include=health,info,metrics,env,configprops
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.info.build.enabled=true
management.info.git.enabled=true

# Load balancing - enable multiple instance registration
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.instance.prefer-ip-address=true

# JWT security
security.jwt.secret=${JWT_SECRET:VGhpc0lzQVN0cm9uZ0Rldk9ubHlKV1RTZWNyZXRLZXlGb3JTbWFydEZyZWVsYW5jZQ==}

