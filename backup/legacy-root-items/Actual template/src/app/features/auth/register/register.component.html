<div class="auth-wrapper">
  <div class="glass-panel auth-card">
    <div class="auth-header">
      <h2>Create an Account</h2>
      <p>Join FreeFlow as a Client or Freelancer</p>
    </div>
    <div class="role-selector">
      <button class="role-btn active">I'm a Client</button>
      <button class="role-btn">I'm a Freelancer</button>
    </div>
    <form class="auth-form" (ngSubmit)="onSubmit($event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary full-width">Sign Up</button>
    </form>
    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Log in</a></p>
    </div>
  </div>
</div>
