spring.application.name=marketing-service
server.port=8092

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/MarketingDB?createDatabaseIfNotExist=true&useUnicode=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Logging (optionnel)
logging.level.org.springframework.cloud.client.discovery=DEBUG