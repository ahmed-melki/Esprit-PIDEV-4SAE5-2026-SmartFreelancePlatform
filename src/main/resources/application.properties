### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/Communication?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

### SERVER ###
server.servlet.context-path=/Communication
server.port=8089
spring.web.resources.static-locations=file:uploads/
spring.mvc.static-path-pattern=/uploads/**

### EUREKA ###
spring.application.name=communication-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

### GROQ via OpenAI Compatibility Layer ###
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

