<div class="report-container">
  <div class="report-header">
    <h2>🚨 Report Article</h2>
    <p>Your report helps us maintain a quality community</p>
  </div>

  <!-- Loading -->
  <div *ngIf="!isLoaded" class="loading">
    ⏳ Loading article...
  </div>

  <!-- Article preview -->
  <div class="article-preview" *ngIf="article && isLoaded">
    <h3>Reported article:</h3>
    <div class="preview-card">
      <h4>{{ article.title }}</h4>
      <p class="author">By: {{ article.author || 'Unknown author' }}</p>
      <p class="content-preview">{{ article.content | slice:0:200 }}{{ article.content.length > 200 ? '...' : '' }}</p>
    </div>
  </div>

  <!-- Report form -->
  <form (ngSubmit)="submitReport()" #reportForm="ngForm" class="report-form" *ngIf="isLoaded">
    
    <!-- Reason -->
    <div class="form-group">
      <label for="reason">Reason for reporting *</label>
      <select id="reason" name="reason" [(ngModel)]="reportData.reason" required>
        <option value="">Select a reason</option>
        <option *ngFor="let r of reasons" [value]="r.value">
          {{ r.label }}
        </option>
      </select>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label for="description">Detailed description *</label>
      <textarea 
        id="description" 
        name="description" 
        rows="5"
        [(ngModel)]="reportData.description"
        required
        placeholder="Please explain why you are reporting this article..."
      ></textarea>
    </div>

    <!-- Name (optional) -->
    <div class="form-group">
      <label for="reporterName">Your name (optional)</label>
      <input 
        type="text" 
        id="reporterName" 
        name="reporterName"
        [(ngModel)]="reportData.reporterName"
        placeholder="Leave blank to stay anonymous"
      >
    </div>

    <!-- Email (optional) -->
    <div class="form-group">
      <label for="email">Your email (optional)</label>
      <input 
        type="email" 
        id="email" 
        name="email"
        [(ngModel)]="reportData.email"
        placeholder="For follow-up if needed"
      >
    </div>

    <!-- Buttons -->
    <div class="form-actions">
      <button type="button" (click)="cancelReport()" class="btn-cancel">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="!reportForm.form.valid || isSubmitting">
        {{ isSubmitting ? '⏳ Sending...' : '🚨 Submit Report' }}
      </button>
    </div>
  </form>
</div>
