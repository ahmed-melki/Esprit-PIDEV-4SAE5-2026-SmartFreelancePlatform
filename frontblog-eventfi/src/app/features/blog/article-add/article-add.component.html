<div class="freelance-container form-wrapper">
  
  <div class="form-header">
    <h2>Post a new Article</h2>
    <p>Share your ideas and insights with the community.</p>
  </div>

  <div *ngIf="errorMessage" class="empty-state error-banner">
    <div class="empty-icon">⚠️</div>
    <p>{{ errorMessage }}</p>
  </div>

  <form [formGroup]="articleForm" (ngSubmit)="onSubmit()" class="freelance-form">
    
    <!-- Title -->
    <div class="form-group">
      <label for="title" class="form-label">Article Title <span class="required">*</span></label>
      <input 
        type="text" 
        id="title" 
        formControlName="title" 
        class="form-control" 
        [class.is-invalid]="submitted && f['title'].invalid"
        placeholder="Enter a descriptive title">
      <div *ngIf="submitted && f['title'].invalid" class="invalid-feedback">
        <span *ngIf="f['title'].errors?.['required']">Title is required.</span>
        <span *ngIf="f['title'].errors?.['minlength']">Minimum 3 characters.</span>
        <span *ngIf="f['title'].errors?.['maxlength']">Maximum 200 characters.</span>
      </div>
    </div>

    <!-- Author & Category -->
    <div class="form-row">
      <div class="form-group half-width">
        <label for="author" class="form-label">Author <span class="required">*</span></label>
        <input 
          type="text" 
          id="author" 
          formControlName="author" 
          class="form-control" 
          [class.is-invalid]="submitted && f['author'].invalid"
          placeholder="Your name">
        <div *ngIf="submitted && f['author'].invalid" class="invalid-feedback">
          <span *ngIf="f['author'].errors?.['required']">Author is required.</span>
        </div>
      </div>

      <div class="form-group half-width">
        <label for="category" class="form-label">Category <span class="required">*</span></label>
        <select 
          id="category" 
          formControlName="category" 
          class="form-control" 
          [class.is-invalid]="submitted && f['category'].invalid">
          <option value="" disabled selected>Select a category</option>
          <option value="Développement">Development</option>
          <option value="Base de données">Database</option>
          <option value="DevOps">DevOps</option>
          <option value="Design">Design</option>
          <option value="Marketing">Marketing</option>
          <option value="Business">Business</option>
          <option value="Autre">Other</option>
        </select>
        <div *ngIf="submitted && f['category'].invalid" class="invalid-feedback">
          <span>Category is required.</span>
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div class="form-group">
      <label for="summary" class="form-label">
        Summary <span>(optional) {{ f['summary'].value?.length || 0 }}/500</span>
      </label>
      <textarea 
        id="summary" 
        formControlName="summary" 
        rows="3" 
        class="form-control" 
        [class.is-invalid]="submitted && f['summary'].invalid"
        placeholder="A brief executive summary..."></textarea>
      <div *ngIf="submitted && f['summary'].invalid" class="invalid-feedback">
        <span *ngIf="f['summary'].errors?.['maxlength']">Maximum 500 characters.</span>
      </div>
    </div>

    <!-- Content -->
    <div class="form-group">
      <label for="content" class="form-label">
        Content <span class="required">*</span>
      </label>
      <textarea 
        id="content" 
        formControlName="content" 
        rows="10" 
        class="form-control large-textarea" 
        [class.is-invalid]="submitted && f['content'].invalid"
        placeholder="Write the full content of your article here..."></textarea>
      <div *ngIf="submitted && f['content'].invalid" class="invalid-feedback">
        <span *ngIf="f['content'].errors?.['required']">Content is required.</span>
        <span *ngIf="f['content'].errors?.['minlength']">Minimum 200 characters.</span>
      </div>
    </div>

    <!-- Tags -->
    <div class="form-group">
      <label for="tags" class="form-label">
        Skills / Tags <span>(comma separated)</span>
      </label>
      <input 
        type="text" 
        id="tags" 
        formControlName="tags" 
        class="form-control" 
        [class.is-invalid]="submitted && f['tags'].invalid"
        placeholder="Angular, Java, Spring, SEO...">
      <div *ngIf="submitted && f['tags'].invalid" class="invalid-feedback">
        <span *ngIf="f['tags'].errors?.['maxlength']">Maximum 200 characters.</span>
      </div>
    </div>

    <!-- Status -->
    <div class="form-group">
      <label class="form-label">Publication Status</label>
      <div class="status-toggle">
        <button type="button" class="toggle-btn" [class.active]="f['status'].value === 'Brouillon'" (click)="articleForm.patchValue({status: 'Brouillon'})">
          Draft
        </button>
        <button type="button" class="toggle-btn" [class.active]="f['status'].value === 'Publié'" (click)="articleForm.patchValue({status: 'Publié'})">
          Published
        </button>
      </div>
      <input type="hidden" formControlName="status">
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Saving...' : 'Post Article' }}
      </button>
    </div>
  </form>
</div>
