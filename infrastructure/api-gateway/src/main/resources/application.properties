server.port=8100

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8150/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=training-certification-service
spring.cloud.gateway.routes[0].uri=lb://training-certification-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/trainings/**,/api/certifications/**,/api/reviews/**,/api/titles/**
spring.cloud.gateway.routes[0].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST

spring.cloud.gateway.routes[1].id=back-service
spring.cloud.gateway.routes[1].uri=lb://back-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/**
spring.cloud.gateway.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST

# CORS for Angular development client. Gateway must answer preflight requests
# before they are routed to backend controllers.
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Monitoring endpoints
management.endpoints.web.exposure.include=health,info,metrics,env,configprops,gateway
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.info.build.enabled=true
management.info.git.enabled=true

# Load balancing configuration
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.retry.max-attempts=3
spring.cloud.loadbalancer.retry.backoff.initial-interval=1000
