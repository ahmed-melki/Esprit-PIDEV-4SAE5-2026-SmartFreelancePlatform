apiVersion: apps/v1
kind: Deployment
metadata:
  name: communication-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: communication-db
  template:
    metadata:
      labels:
        app: communication-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: "Communication"
            - name: MYSQL_ROOT_PASSWORD
              value: ""
            - name: MYSQL_ALLOW_EMPTY_PASSWORD
              value: "yes"
---
apiVersion: v1
kind: Service
metadata:
  name: communication-db
spec:
  selector:
    app: communication-db
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
