apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: devops
type: Opaque
data:
  mysql-username: cm9vdA==
  mysql-password: cm9vdA==
  jwt-secret: VGhpc0lzQVN0cm9uZ0Rldk9ubHlKV1RTZWNyZXRLZXlGb3JTbWFydEZyZWVsYW5jZQ==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: devops
data:
  datasource-url: jdbc:mysql://mysql-service:3306/Pidev4eme?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
  eureka-url: http://discovery-service:8150/eureka/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
        - name: discovery-service
          image: rayenetr/discovery-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8150
          env:
            - name: ZIPKIN_ENDPOINT
              value: http://jaeger:9411/api/v2/spans
          livenessProbe:
            tcpSocket:
              port: 8150
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8150
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: devops
spec:
  selector:
    app: discovery-service
  ports:
    - protocol: TCP
      port: 8150
      targetPort: 8150
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-service
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-service
  template:
    metadata:
      labels:
        app: back-service
    spec:
      containers:
        - name: back-service
          image: rayenetr/back-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8200
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: mysql-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: mysql-password
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: eureka-url
            - name: ZIPKIN_ENDPOINT
              value: http://jaeger:9411/api/v2/spans
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
          livenessProbe:
            tcpSocket:
              port: 8200
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8200
            initialDelaySeconds: 45
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: back-service
  namespace: devops
spec:
  selector:
    app: back-service
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
  type: ClusterIP
---
