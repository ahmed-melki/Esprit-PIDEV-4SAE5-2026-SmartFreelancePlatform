apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: devops
spec:
  type: NodePort
  selector:
    app: sonarqube
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30090
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarqube-pvc
  namespace: devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /opt/sonarqube/data /opt/sonarqube/extensions /opt/sonarqube/logs"]
          volumeMounts:
            - name: sonarqube-pvc
              mountPath: /opt/sonarqube/data
              subPath: data
            - name: sonarqube-pvc
              mountPath: /opt/sonarqube/extensions
              subPath: extensions
            - name: sonarqube-pvc
              mountPath: /opt/sonarqube/logs
              subPath: logs
      containers:
        - name: sonarqube
          image: sonarqube:9.9-community
          ports:
            - containerPort: 9000
          env:
            - name: SONAR_ES_BOOTSTRAP_CHECKS_DISABLE
              value: "true"
          volumeMounts:
            - name: sonarqube-pvc
              mountPath: /opt/sonarqube/data
              subPath: data
            - name: sonarqube-pvc
              mountPath: /opt/sonarqube/extensions
              subPath: extensions
            - name: sonarqube-pvc
              mountPath: /opt/sonarqube/logs
              subPath: logs
      volumes:
        - name: sonarqube-pvc
          persistentVolumeClaim:
            claimName: sonarqube-pvc