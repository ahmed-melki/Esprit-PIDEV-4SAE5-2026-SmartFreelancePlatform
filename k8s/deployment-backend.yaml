apiVersion: apps/v1
kind: Deployment
metadata:
  name: communication-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: communication-service
  template:
    metadata:
      labels:
        app: communication-service
    spec:
      containers:
        - name: communication-service
          image: ahmedmelki/communication-service:latest
          ports:
            - containerPort: 8089
---
apiVersion: v1
kind: Service
metadata:
  name: communication-service-svc
spec:
  selector:
    app: communication-service
  ports:
    - port: 8089
      targetPort: 8089
  type: NodePort
