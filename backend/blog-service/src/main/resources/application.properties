
spring.application.name=blog-service
server.port=8082
server.servlet.context-path=/piblog

# =========================
# Datasource / MySQL
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/blog?useUnicode=true&useJDBCCompliantTimezoneShift=true&createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# =========================
# JPA / Hibernate
# =========================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================
# Eureka Client
# =========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Heartbeat / lease config
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Optional: prefer IP address over hostname
eureka.instance.prefer-ip-address=true

# =========================
# Logging
# =========================
logging.level.org.springframework=INFO
logging.level.com.yourpackage=DEBUG

# =========================
# Optional - Timezone
# =========================
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =========================
# Optional - Server error path
# =========================
server.error.include-message=always