apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: event-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: gestion-event
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /pi/actuator/prometheus
      interval: 15s