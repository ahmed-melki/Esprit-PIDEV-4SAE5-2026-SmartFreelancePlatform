apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-event
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestion-event
  template:
    metadata:
      labels:
        app: gestion-event
    spec:
      containers:
        - name: gestion-event
          image: omayma13/gestion-event:latest
          ports:
            - containerPort: 8081
          imagePullPolicy: Always
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/gestion_event?createDatabaseIfNotExist=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"