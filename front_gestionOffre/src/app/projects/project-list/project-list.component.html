<div class="projects-board">
  <!-- Filtres rapides -->
  <div class="filters-bar">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Filtrer par statut</mat-label>
      <!-- AJOUT DE (selectionChange)="applyFilter()" -->
      <mat-select 
        [(value)]="selectedStatus" 
        (selectionChange)="applyFilter()">  <!-- ← LIGNE AJOUTÉE -->
        <mat-option value="all">All</mat-option>
        <mat-option value="OPEN">Open</mat-option>
        <mat-option value="IN_PROGRESS">In progress</mat-option>
        <mat-option value="CLOSED">Closed</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Search</mat-label>
      <input 
        matInput 
        (keyup)="applyFilter($event)" 
        placeholder="Titre, description...">
    </mat-form-field>
  </div>

  <!-- Grille de projets modernes -->
  <div class="modern-grid">
    <mat-card *ngFor="let project of filteredProjects" class="modern-card" [ngClass]="'status-' + project.status.toLowerCase()">
      
      <!-- Badge de statut -->
      <div class="status-badge" [ngClass]="project.status.toLowerCase()">
        {{ project.status }}
      </div>

      <!-- Contenu -->
      <mat-card-header>
        <mat-icon class="card-icon">assignment</mat-icon>
        <mat-card-title>{{ project.title }}</mat-card-title>
        <mat-card-subtitle>Projet #{{ project.id }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>{{ project.description }}</p>

        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Budget</span>
            <span class="info-value budget">{{ project.budget | currency:'EUR' }}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Deadline</span>
            <span class="info-value">{{ project.deadline | date:'dd/MM/yyyy' }}</span>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button color="primary" (click)="viewProject(project.id!)">
          <mat-icon>visibility</mat-icon> Détails
        </button>
        <button mat-button color="accent" (click)="editProject(project.id!)">
          <mat-icon>edit</mat-icon> Modifier
        </button>
        <button mat-button color="warn" (click)="deleteProject(project.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
