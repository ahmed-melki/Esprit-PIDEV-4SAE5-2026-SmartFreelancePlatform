<div class="form-container">
  <div class="form-header">
    <h1>{{ isEditMode ? 'Edit Article' : 'Write New Story' }}</h1>
    <p class="text-secondary">Capture your ideas and share them with the community.</p>
  </div>

  <form [formGroup]="articleForm" (ngSubmit)="onSubmit()" class="premium-form">
    <div class="form-group">
      <label for="title">Title</label>
      <input 
        id="title" 
        name="title"
        type="text" 
        formControlName="title" 
        class="form-control" 
        placeholder="A catchy title..."
      >
      <div *ngIf="articleForm.get('title')?.touched && articleForm.get('title')?.invalid" class="error-msg">
        Title must be at least 5 characters long.
      </div>
    </div>

    <div class="row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div class="form-group">
        <label for="author">Author Name</label>
        <input 
          id="author" 
          name="author"
          type="text" 
          formControlName="author" 
          class="form-control" 
          placeholder="Who's writing?"
        >
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" formControlName="category" class="form-control">
          <option value="">Select Category</option>
          <option value="Technology">Technology</option>
          <option value="Freelancing">Freelancing</option>
          <option value="Business">Business</option>
          <option value="Life">Life</option>
          <option value="Productivity">Productivity</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="summary">Summary</label>
      <input 
        id="summary" 
        name="summary"
        type="text" 
        formControlName="summary" 
        class="form-control" 
        placeholder="Brief overview in one sentence..."
      >
    </div>

    <div class="form-group">
      <label for="content">Article Content</label>
      <textarea 
        id="content" 
        name="content"
        formControlName="content" 
        class="form-control content-area" 
        placeholder="Tell your story..."
      ></textarea>
      <div *ngIf="articleForm.get('content')?.touched && articleForm.get('content')?.invalid" class="error-msg">
        Content is too short.
      </div>
    </div>

    <div class="form-group">
      <label for="tags">Tags (Comma separated)</label>
      <input 
        id="tags" 
        name="tags"
        type="text" 
        formControlName="tags" 
        class="form-control" 
        placeholder="freelance, tips, career..."
      >
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="articleForm.invalid || isLoading">
        {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Article' : 'Publish Story') }}
      </button>
      <button type="button" class="btn btn-secondary" [routerLink]="['/blog']">
        Cancel
      </button>
    </div>
  </form>
</div>
