<div class="login-page">
  <div class="form-card">
    <div class="form-header">
      <h2>Welcome back</h2>
      <p>Sign in to your FreeFlow account</p>
    </div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
      <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
    </form>
    <div class="footer-link">Don't have an account? <a routerLink="/signup">Sign up</a></div>
  </div>
</div><div class="login-page">
