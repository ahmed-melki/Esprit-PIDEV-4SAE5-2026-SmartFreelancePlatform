spring.application.name=JobOffre
spring.datasource.url=jdbc:mysql://localhost:3306/Projetfreelancer?useUnicode=true&useJDBCCompliantTimezoneShift=true&createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8052
# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# EUREKA INSTANCE CONFIGURATION
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ============================================
# FEIGN CLIENT CONFIGURATION
# ============================================
# Dťsactiver l'import des configs cloud
spring.cloud.config.import-check.enabled=false
spring.cloud.config.fail-fast=true

# Feign timeouts
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.com.netflix.discovery=DEBUG

