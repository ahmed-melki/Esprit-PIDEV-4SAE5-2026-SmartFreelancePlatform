spring.application.name=JobOffre
spring.datasource.url=jdbc:mysql://localhost:3306/jobDB?useUnicode=true&useJDBCCompliantTimezoneShift=true&createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8052

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.security.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.cloud.config.import-check.enabled=false
spring.cloud.config.fail-fast=true

feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.com.netflix.discovery=DEBUG