apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: job-offer
data:
  application.properties: |
    spring.application.name=JobOffer
    spring.datasource.url=jdbc:mysql://mysql-joboffer:3306/jobDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    spring.datasource.username=root
    spring.datasource.password=
    spring.jpa.show-sql=true
    spring.jpa.hibernate.ddl-auto=update
    server.port=8046
    eureka.client.enabled=false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-profile
  namespace: job-offer
data:
  SPRING_PROFILES_ACTIVE: "dev"