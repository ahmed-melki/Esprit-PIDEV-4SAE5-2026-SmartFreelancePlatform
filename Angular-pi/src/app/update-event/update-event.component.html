<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifier l'événement</title>
  
  <!-- Polices et icônes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Carte compacte */
    .edit-card {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      overflow: hidden;
    }

    /* En-tête compact */
    .card-header {
      background: linear-gradient(135deg, #6366f1, #ec4899);
      padding: 1.2rem 1.5rem;
    }

    .card-header h2 {
      color: white;
      font-size: 1.4rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-header h2 i {
      font-size: 1.3rem;
    }

    .card-header p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.75rem;
      margin-top: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Corps compact */
    .card-body {
      padding: 1.2rem;
    }

    /* Formulaire compact */
    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    /* Grille plus serrée */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }

    .full-width {
      grid-column: span 2;
    }

    /* Groupes compacts */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    /* Labels petits */
    .form-label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 500;
      color: #1e293b;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-label i {
      color: #6366f1;
      font-size: 0.8rem;
      width: 16px;
    }

    .required-star {
      color: #ef4444;
      font-size: 0.8rem;
      margin-left: 0.1rem;
    }

    /* Inputs compacts */
    .form-input, .form-textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-textarea {
      min-height: 70px;
      resize: vertical;
    }

    /* Input avec icône pour le prix */
    .price-input {
      position: relative;
    }

    .price-input .form-input {
      padding-left: 1.5rem;
    }

    .price-symbol {
      position: absolute;
      left: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* Bouton compact */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }

    .submit-btn {
      padding: 0.7rem 1.8rem;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 5px 12px -5px rgba(99, 102, 241, 0.4);
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 15px -5px rgba(99, 102, 241, 0.5);
    }

    .submit-btn i {
      font-size: 0.9rem;
    }

    /* Badge d'info compact */
    .info-badge {
      background: #f1f5f9;
      border-radius: 30px;
      padding: 0.4rem 1rem;
      margin-bottom: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    .info-badge i {
      color: #6366f1;
      font-size: 0.8rem;
    }

    /* Séparateur compact */
    .form-divider {
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.2rem 0;
    }

    .form-divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
    }

    .form-divider i {
      color: #94a3b8;
      font-size: 0.8rem;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      
      .full-width {
        grid-column: span 1;
      }
      
      .form-actions {
        justify-content: stretch;
      }
      
      .submit-btn {
        width: 100%;
        justify-content: center;
      }
      
      .card-header h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="edit-card">
    <!-- En-tête compact -->
    <div class="card-header">
      <h2>
        <i class="fas fa-calendar-edit"></i>
        Modifier l'événement
      </h2>
      <p>
        <i class="fas fa-info-circle"></i>
        Formulaire compact
      </p>
    </div>

    <div class="card-body">
      <!-- Badge compact -->
      <div class="info-badge">
        <i class="fas fa-asterisk"></i>
        Champs obligatoires *
      </div>

      <!-- Formulaire compact -->
      <form class="edit-form" (ngSubmit)="update()">
        <div class="form-grid">
          <!-- Titre -->
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-heading"></i>
              Titre
              <span class="required-star">*</span>
            </label>
            <input 
              type="text" 
              class="form-input" 
              [(ngModel)]="event.title" 
              name="title" 
              required 
              placeholder="Titre"
            >
          </div>

          <!-- Type -->
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-tag"></i>
              Type
            </label>
            <input 
              type="text" 
              class="form-input" 
              [(ngModel)]="event.type" 
              name="type" 
              placeholder="Type"
            >
          </div>

          <!-- Catégorie -->
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-folder"></i>
              Catégorie
            </label>
            <input 
              type="text" 
              class="form-input" 
              [(ngModel)]="event.category" 
              name="category" 
              placeholder="Catégorie"
            >
          </div>

          <!-- Lieu -->
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-map-marker-alt"></i>
              Lieu
            </label>
            <input 
              type="text" 
              class="form-input" 
              [(ngModel)]="event.location" 
              name="location" 
              placeholder="Lieu"
            >
          </div>

          <!-- Début -->
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-calendar-plus"></i>
              Début
            </label>
            <input 
              type="datetime-local" 
              class="form-input" 
              [(ngModel)]="event.startDate" 
              name="startDate"
            >
          </div>

          <!-- Fin -->
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-calendar-times"></i>
              Fin
            </label>
            <input 
              type="datetime-local" 
              class="form-input" 
              [(ngModel)]="event.endDate" 
              name="endDate"
            >
          </div>

          <!-- Prix -->
          <div class="form-group full-width">
            <label class="form-label">
              <i class="fas fa-tag"></i>
              Prix
            </label>
            <div class="price-input">
              <input 
                type="number" 
                class="form-input" 
                [(ngModel)]="event.price" 
                name="price" 
                placeholder="0.00"
                min="0"
                step="0.01"
              >
              <span class="price-symbol">€</span>
            </div>
          </div>

          <!-- Description -->
          <div class="form-group full-width">
            <label class="form-label">
              <i class="fas fa-align-left"></i>
              Description
              <span class="required-star">*</span>
            </label>
            <textarea 
              class="form-textarea" 
              [(ngModel)]="event.description" 
              name="description" 
              required 
              placeholder="Description..."
            ></textarea>
          </div>
        </div>

        <!-- Bouton compact -->
        <div class="form-actions">
          <button type="submit" class="submit-btn">
            <span>Mettre à jour</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
