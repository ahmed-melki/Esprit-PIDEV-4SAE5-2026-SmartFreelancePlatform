<h2>Événements Freelance</h2>

<div class="events-container">
  <div class="event-card" *ngFor="let event of events">

    <div class="event-header">
      <h3>{{ event.title }}</h3>
      <span class="event-type">{{ event.type }}</span>
    </div>

    <p class="event-desc">{{ event.description }}</p>

    <div class="event-info">
      <div><strong>Catégorie:</strong> {{ event.category }}</div>
      <div><strong>Lieu:</strong> {{ event.location }}</div>
    </div>

    <div class="event-dates">
      <div><strong>Début:</strong> {{ event.startDate | date:'short' }}</div>
      <div><strong>Fin:</strong> {{ event.endDate | date:'short' }}</div>
    </div>

    <div class="event-price">
      <strong>Prix:</strong> {{ event.price | currency }}
    </div>

    <div class="event-actions">

      <!-- ✅ BOUTON EDIT -->
      <button 
        class="edit-btn"
        [routerLink]="['/event/edit', event.id]"
        title="Modifier">

        <svg xmlns="http://www.w3.org/2000/svg" 
             width="18" height="18" 
             fill="white" 
             viewBox="0 0 24 24">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm18-11.5
                   a1 1 0 0 0 0-1.41l-2.34-2.34
                   a1 1 0 0 0-1.41 0l-1.83 1.83
                   3.75 3.75L21 5.75z"/>
        </svg>

      </button>

      <!-- ❌ BOUTON DELETE -->
      <button 
        class="delete-btn" 
        (click)="deleteEvent(event.id!)" 
        title="Supprimer">

        <svg xmlns="http://www.w3.org/2000/svg" 
             width="18" height="18" 
             fill="white" 
             viewBox="0 0 24 24">
          <path d="M3 6h18v2H3V6zm2 3h14v13H5V9zm5 2v9h2v-9H10zm4 0v9h2v-9h-2z"/>
        </svg>

      </button>

    </div>

  </div>
</div>

<p *ngIf="events.length === 0" class="no-event">
  Aucun événement trouvé.
</p>
