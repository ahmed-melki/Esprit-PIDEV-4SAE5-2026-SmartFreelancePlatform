spring.application.name=gateway-service
server.port=8082

# Configuration des routes dynamiques avec Eureka
spring.cloud.gateway.routes[0].id=PROJETPI
spring.cloud.gateway.routes[0].uri=lb://PROJETPI
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.routes[1].id=event-service
spring.cloud.gateway.routes[1].uri=http://localhost:8070
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/events/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# ?? Ajoute ces deux lignes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
